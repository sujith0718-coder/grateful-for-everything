
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grateful for this life...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;background:linear-gradient(135deg,#ffd6e8,#ffeef5)}
.card{background:#fff;padding:40px;border-radius:24px;box-shadow:0 10px 25px rgba(0,0,0,.2);text-align:center;position:relative;z-index:2}
.cake{font-size:90px;animation:bounce 1.5s infinite}
h1{margin:20px 0;color:#d63384;min-height:50px}
button{padding:12px 28px;border:none;border-radius:30px;background:#ff4f8b;color:#fff;font-size:18px;cursor:pointer}
.confetti,.heart{position:fixed;pointer-events:none}
.confetti{width:8px;height:8px;border-radius:50%;animation:fall 3s linear forwards}
.heart{font-size:28px;animation:burst 1.8s ease-out forwards}
@keyframes bounce{50%{transform:translateY(-15px)}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.8}}
@keyframes burst{to{transform:translate(var(--x),var(--y)) scale(.2);opacity:0}}
</style>
</head>
<body>
<div class="card">
<div class="cake">🎂</div>
<h1 id="msg"></h1>
<button id="btn" onclick="celebrate()">Celebrate 🎉</button>
</div>
<script>
const t="🎉 Happy Birthday! 🎂";let i=0;
(function type(){if(i<t.length){msg.textContent+=t[i++];setTimeout(type,120)}})();
function celebrate(){
for(let i=0;i<120;i++){
 let c=document.createElement("div");
 c.className="confetti";
 c.style.left=Math.random()*innerWidth+"px";
 c.style.top="-10px";
 c.style.background=`hsl(${Math.random()*360},100%,50%)`;
 c.style.animationDuration=(2+Math.random()*2)+"s";
 document.body.appendChild(c);
 setTimeout(()=>c.remove(),4000);
}
const r=btn.getBoundingClientRect();
const cx=r.left+r.width/2, cy=r.top+r.height/2;
for(let i=0;i<40;i++){
 let h=document.createElement("div");
 h.className="heart";
 h.textContent="❤️";
 h.style.left=cx+"px";
 h.style.top=cy+"px";
 const a=Math.random()*Math.PI*2;
 const d=80+Math.random()*180;
 h.style.setProperty("--x",Math.cos(a)*d+"px");
 h.style.setProperty("--y",Math.sin(a)*d+"px");
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),1800);
}
}
</script>
</body>
</html>
